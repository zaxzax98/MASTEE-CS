<script>
var studyLoaded = false;
var mcqLoaded = false;

function b64ToUtf8(b64) {
  var binary = atob(b64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function switchApp(target) {
  document.getElementById('tab-study').classList.toggle('active', target === 'study');
  document.getElementById('tab-mcq').classList.toggle('active', target === 'mcq');
  document.getElementById('frame-study').classList.toggle('active', target === 'study');
  document.getElementById('frame-mcq').classList.toggle('active', target === 'mcq');

  if (target === 'study' && !studyLoaded) loadStudyFrame();
  if (target === 'mcq' && !mcqLoaded) loadMcqFrame();
}

function loadStudyFrame() {
  try {
    var b64 = document.getElementById('study-b64').textContent;
    var html = b64ToUtf8(b64);
    var frame = document.getElementById('frame-study');
    frame.srcdoc = html;
    frame.onload = function() {
      document.getElementById('loading-study').style.display = 'none';
    };
    studyLoaded = true;
  } catch (e) {
    document.getElementById('loading-study').style.display = 'none';
    var box = document.getElementById('err-study');
    box.style.display = 'flex';
    box.textContent = 'Error loading Study Platform: ' + e.message;
  }
}

function loadMcqFrame() {
  document.getElementById('loading-mcq').style.display = 'flex';
  try {
    var b64 = document.getElementById('mcq-b64').textContent;
    var html = b64ToUtf8(b64);
    var frame = document.getElementById('frame-mcq');
    frame.srcdoc = html;
    frame.onload = function() {
      document.getElementById('loading-mcq').style.display = 'none';
    };
    mcqLoaded = true;
  } catch (e) {
    document.getElementById('loading-mcq').style.display = 'none';
    var box = document.getElementById('err-mcq');
    box.style.display = 'flex';
    box.textContent = 'Error loading MCQ Bank: ' + e.message;
  }
}

loadStudyFrame();
</script>
