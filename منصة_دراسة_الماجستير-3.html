<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة دراسة الماجستير | Master's Study Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0b1320;
  --paper: #f6f3ec;
  --signal: #ff5a36;
  --deep: #133a52;
  --wire: #2e7d6b;
  --line: #d8d2c4;
  --card: #ffffff;
  --muted: #6b6458;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Tajawal', sans-serif;
  -webkit-font-smoothing: antialiased;
}

.en { font-family: 'Space Grotesk', sans-serif; direction: ltr; }
.mono { font-family: 'IBM Plex Mono', monospace; direction: ltr; }

/* ===== TOP BAR ===== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--ink);
  color: var(--paper);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 3px solid var(--signal);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  width: 36px; height: 36px;
  border: 2px solid var(--signal);
  position: relative;
  flex-shrink: 0;
}
.brand-mark::before, .brand-mark::after {
  content: '';
  position: absolute;
  left: 4px; right: 4px;
  height: 2px;
  background: var(--signal);
}
.brand-mark::before { top: 10px; }
.brand-mark::after { top: 22px; }

.brand-text { line-height: 1.1; }
.brand-text .ar { font-weight: 900; font-size: 16px; }
.brand-text .sub { font-size: 10px; color: #9aa5b1; letter-spacing: 1px; }

.subject-tabs {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 0 28px;
  background: var(--deep);
}

.subject-tab {
  padding: 12px 18px;
  font-weight: 700;
  font-size: 14px;
  color: #c7d3dc;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.subject-tab .num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  opacity: .6;
}
.subject-tab:hover { color: #fff; background: rgba(255,255,255,.05); }
.subject-tab.active {
  color: #fff;
  border-bottom-color: var(--signal);
  background: rgba(255,90,54,.12);
}

/* ===== SUB-NAV (sections within a subject) ===== */
.subnav {
  display: flex;
  gap: 6px;
  padding: 14px 28px;
  background: var(--card);
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
  position: sticky;
  top: 93px;
  z-index: 90;
}

.subnav-btn {
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 700;
  border: 1.5px solid var(--line);
  background: var(--paper);
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.subnav-btn:hover { border-color: var(--deep); color: var(--deep); }
.subnav-btn.active {
  background: var(--deep);
  border-color: var(--deep);
  color: #fff;
}

/* ===== MAIN CONTENT ===== */
.content {
  max-width: 920px;
  margin: 0 auto;
  padding: 36px 24px 80px;
}

.subject-hero {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 4px solid var(--ink);
}
.subject-hero .eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--signal);
  font-weight: 600;
  letter-spacing: 2px;
  direction: ltr;
  text-align: right;
}
.subject-hero h1 {
  font-size: 36px;
  font-weight: 900;
  margin: 6px 0;
}
.subject-hero .source {
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  direction: ltr;
  text-align: right;
}

.section-block {
  margin-bottom: 40px;
}

.section-title {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--line);
}
.section-title .idx {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 700;
  color: var(--signal);
  font-size: 14px;
}
.section-title h2 {
  font-size: 22px;
  font-weight: 900;
}
.section-title .en-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--deep);
  direction: ltr;
}

/* Bilingual explanation card */
.bi-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 4px;
  margin: 14px 0;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.bi-card .ar-part {
  padding: 16px 20px;
  font-size: 15px;
  line-height: 1.9;
  border-right: 4px solid var(--wire);
}
.bi-card .ar-part strong { color: var(--wire); }
.bi-card .en-part {
  padding: 14px 20px;
  font-size: 14px;
  line-height: 1.75;
  color: var(--muted);
  background: var(--paper);
  direction: ltr;
  text-align: left;
  border-top: 1px dashed var(--line);
  font-family: 'Space Grotesk', sans-serif;
}
.bi-card .en-part strong { color: var(--deep); }

/* Verbatim quote from textbook */
.quote-card {
  background: #fffdf7;
  border: 1.5px solid #e8dcc0;
  border-radius: 4px;
  padding: 16px 20px;
  margin: 14px 0;
}
.quote-label {
  font-size: 12px;
  font-weight: 700;
  color: #a8762f;
  margin-bottom: 8px;
}
.quote-text {
  font-family: 'Space Grotesk', sans-serif;
  direction: ltr;
  text-align: left;
  font-style: italic;
  font-size: 14px;
  line-height: 1.75;
  color: #4a4030;
}

/* Tables */
table.data-tbl {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 14px;
}
table.data-tbl th {
  background: var(--ink);
  color: #fff;
  padding: 10px 14px;
  text-align: right;
  font-weight: 700;
}
table.data-tbl td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--line);
}
table.data-tbl tr:nth-child(even) td { background: #faf8f3; }

/* Code/formula block */
.code-block {
  background: var(--ink);
  color: #d4ecdf;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13.5px;
  line-height: 1.8;
  padding: 16px 20px;
  border-radius: 4px;
  margin: 14px 0;
  direction: ltr;
  text-align: left;
  white-space: pre-wrap;
  overflow-x: auto;
}
.code-block .hl { color: var(--signal); font-weight: 700; }

/* Diagram placeholder box */
.diagram-box {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 4px;
  padding: 20px;
  margin: 16px 0;
  text-align: center;
}

/* Note/tip box */
.note-box {
  background: #eef6f3;
  border-right: 4px solid var(--wire);
  padding: 14px 18px;
  border-radius: 4px;
  margin: 14px 0;
  font-size: 14px;
  line-height: 1.8;
}
.note-box .label { font-weight: 700; color: var(--wire); }

/* ===== MCQ ===== */
.mcq-source-tag {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 100px;
  margin-bottom: 10px;
  direction: ltr;
}
.tag-book { background: #e3ecf5; color: var(--deep); }
.tag-san { background: #fde8e3; color: var(--signal); }

.mcq-item {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 18px 20px;
  margin-bottom: 16px;
}
.mcq-q {
  font-weight: 700;
  font-size: 15px;
  margin-bottom: 12px;
  line-height: 1.7;
  direction: ltr;
  text-align: left;
  font-family: 'Space Grotesk', sans-serif;
}
.mcq-options {
  display: grid;
  gap: 8px;
}
.mcq-opt {
  padding: 10px 14px;
  border: 1.5px solid var(--line);
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  direction: ltr;
  text-align: left;
  font-family: 'Space Grotesk', sans-serif;
  transition: all .12s;
  display: flex;
  gap: 10px;
}
.mcq-opt:hover { border-color: var(--deep); background: #f4f7f9; }
.mcq-opt.selected { border-color: var(--deep); background: #e3ecf5; }
.mcq-opt.correct { border-color: var(--wire); background: #e3f5ee; }
.mcq-opt.incorrect { border-color: var(--signal); background: #fde8e3; }
.mcq-opt .letter {
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}
.mcq-explain {
  margin-top: 12px;
  padding: 12px 14px;
  background: var(--paper);
  border-radius: 4px;
  font-size: 13.5px;
  line-height: 1.7;
  direction: ltr;
  text-align: left;
  font-family: 'Space Grotesk', sans-serif;
  color: var(--muted);
  display: none;
}
.mcq-explain.show { display: block; }

/* Score bar */
.score-bar {
  position: sticky;
  bottom: 0;
  background: var(--ink);
  color: #fff;
  padding: 14px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  border-top: 3px solid var(--signal);
}
.score-bar .reset-btn {
  background: var(--signal);
  color: #fff;
  border: none;
  padding: 6px 16px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
}

/* Layer stack visual signature element */
.layer-stack {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin: 20px 0;
}
.layer-row {
  display: flex;
  align-items: center;
  height: 44px;
  border-radius: 3px;
  padding: 0 16px;
  font-weight: 700;
  font-size: 13px;
  color: #fff;
  position: relative;
}
.layer-row .layer-num {
  font-family: 'IBM Plex Mono', monospace;
  margin-left: 10px;
  opacity: .7;
}
.layer-row .layer-ar {
  margin-right: auto;
  font-size: 12px;
  opacity: .85;
}

/* Placeholder for subjects not yet built */
.coming-soon {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.coming-soon .big-num {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 64px;
  font-weight: 700;
  color: var(--line);
}

/* Scrollbar */
::-webkit-scrollbar { height: 6px; width: 6px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

@media (max-width: 640px) {
  .subject-hero h1 { font-size: 26px; }
  .content { padding: 24px 16px 80px; }
}
</style>
</head>

function ContentBlock({ block }) {

      );

      return (
        <div className="quote-card">
          <div className="quote-label">{block.label}</div>
          <div className="quote-text">"{block.text}"</div>
        </div>
      );
    case "bi":
      return (
        <div className="bi-card">
          <div className="ar-part"><strong>العربي:</strong> {block.ar}</div>
          <div className="en-part"><strong>English:</strong> {block.en}</div>
        </div>
      );
    case "list":
      return (
        <div className="bi-card">
          <div className="ar-part">
            <strong>{block.ar}</strong>
            <ul style={{marginTop:'8px', paddingRight:'20px', lineHeight:1.9}}>
              {block.items.map((it,i) => <li key={i}>{it}</li>)}
            </ul>
          </div>
        </div>
      );
    case "table":
      return (
        <div>
          {block.ar && <div style={{fontWeight:700, fontSize:'14px', margin:'14px 0 6px'}}>{block.ar}</div>}
          <table className="data-tbl">
            <thead><tr>{block.headers.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
            <tbody>
              {block.rows.map((row,ri)=>(
                <tr key={ri}>{row.map((cell,ci)=><td key={ci}>{cell}</td>)}</tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    case "code":
      return <div className="code-block">{block.text}</div>;
    case "formula":
      return <div className="code-block" style={{textAlign:'center', fontSize:'18px', fontWeight:700}}>{block.text}</div>;
    case "note":
      return (
        <div className="note-box">
          <div><span className="label">💡 العربي: </span>{block.ar}</div>
          {block.enNote && <div className="en" style={{marginTop:'8px', color:'#555'}}><strong>English:</strong> {block.enNote}</div>}

    case "worked":
      return (
        <div className="bi-card">

      return <LayerDiagram />;
    default:
      return null;
  }

function MCQSection({ data }) {
  const [answers, setAnswers] = useState({});
  const [filter, setFilter] = useState('all');

  const indexed = data.map((q, i) => ({...q, _idx: i}));
  const filtered = indexed.filter(q => filter === 'all' || q.src === filter);
  const answeredCount = Object.keys(answers).length;
  const correctCount = Object.entries(answers).filter(([idx, val]) => {
    const q = data[idx];
    return q && val === q.correct;
  }).length;

  function selectAnswer(globalIdx, optIdx) {
    setAnswers(prev => ({...prev, [globalIdx]: optIdx}));
  }

  function resetQuiz() { setAnswers({}); }

  return (
    <div>
      <div style={{display:'flex', gap:'8px', marginBottom:'20px'}}>
        <button className={`subnav-btn ${filter==='all'?'active':''}`} onClick={()=>setFilter('all')}>الكل ({data.length})</button>
        <button className={`subnav-btn ${filter==='book'?'active':''}`} onClick={()=>setFilter('book')}>من الكتاب 📘</button>
        <button className={`subnav-btn ${filter==='san'?'active':''}`} onClick={()=>setFilter('san')}>Sanfoundry 🌐</button>
      </div>

      {filtered.map((q) => {
        const globalIdx = q._idx;
        const userAnswer = answers[globalIdx];
        const isAnswered = userAnswer !== undefined;
        return (
          <div key={globalIdx} className="mcq-item">
            <span className={`mcq-source-tag ${q.src==='book'?'tag-book':'tag-san'}`}>
              {q.src === 'book' ? '📘 Forouzan Textbook' : '🌐 Sanfoundry'}
            </span>
            <div className="mcq-q">{q.q}</div>
            <div className="mcq-options">
              {q.opts.map((opt, oi) => {
                let cls = 'mcq-opt';
                if (isAnswered) {
                  if (oi === q.correct) cls += ' correct';
                  else if (oi === userAnswer) cls += ' incorrect';
                } else if (oi === userAnswer) cls += ' selected';
                return (
                  <div key={oi} className={cls} onClick={() => !isAnswered && selectAnswer(globalIdx, oi)}>
                    <span className="letter">{String.fromCharCode(97+oi)})</span>
                    <span>{opt}</span>
                  </div>
                );
              })}
            </div>
            {isAnswered && (
              <div className="mcq-explain show">
                <strong>{userAnswer === q.correct ? '✅ Correct — ' : '❌ Incorrect — '}</strong>
                {q.explain}
              </div>
            )}
          </div>
        );
      })}

      <div className="score-bar" style={{position:'fixed', bottom:0, left:0, right:0}}>
        <span>الدرجة: <strong className="mono">{correctCount} / {answeredCount}</strong> ({answeredCount}/{data.length} مُجاب)</span>
        <button className="reset-btn" onClick={resetQuiz}>إعادة المحاولة</button>
      </div>
      <div style={{height:'60px'}}></div>
    </div>
  );
}

function ReviewSection({ data }) {
  const priorityColor = { 'حرج جداً': '#ff5a36', 'مهم': '#133a52', 'متوسط': '#2e7d6b' };
  return (
    <div>
      <div className="note-box" style={{marginBottom:'20px'}}>
        <strong>مراجعة نهائية</strong> — أهم النقاط اللي يتكرر عليها السؤال بصيغ مختلفة، مرتبة حسب الأولوية.
      </div>
      {data.map((item, i) => (
        <div key={i} className="bi-card" style={{borderRight: `5px solid ${priorityColor[item.priority]}`}}>
          <div className="ar-part" style={{borderRightColor: priorityColor[item.priority]}}>
            <span style={{
              display:'inline-block', fontSize:'11px', fontWeight:700, color:'#fff',
              background: priorityColor[item.priority], padding:'2px 10px', borderRadius:'100px', marginBottom:'8px'
            }}>{item.priority}</span>
            <div>{item.ar}</div>
          </div>
          <div className="en-part">{item.en}</div>
        </div>
      ))}
    </div>
  );
}

function ComingSoon({ subject }) {
  return (
    <div className="coming-soon">
      <div className="big-num mono">{subject.num}</div>
      <h2 style={{fontSize:'22px', margin:'12px 0'}}>{subject.ar} — قيد الإعداد</h2>
      <p className="en" style={{color:'#9a9488'}}>{subject.en} — Coming Soon</p>
    </div>
  );
}

// Subject -> data bundle map. Add new subjects here as they're built.
const SUBJECT_DATA = {
  networks: {
    overview: NETWORKS_OVERVIEW,
    concepts: NETWORKS_CONCEPTS,
    quicksum: NETWORKS_QUICKSUM,
    review: NETWORKS_REVIEW,
    mcq: NETWORKS_MCQ,
    showLayers: true,
    eyebrow: "SOURCE: FOROUZAN, DATA COMMUNICATIONS & NETWORKING, 4TH ED.",
    titleAr: "شبكات الحاسوب",
    titleEn: "Computer Networks"
  },
  security: {
    overview: SECURITY_OVERVIEW,
    concepts: SECURITY_CONCEPTS,
    quicksum: SECURITY_QUICKSUM,
    review: SECURITY_REVIEW,
    mcq: SECURITY_MCQ,
    showLayers: false,
    eyebrow: "SOURCE: STALLINGS, CRYPTOGRAPHY & NETWORK SECURITY, 7TH ED.",
    titleAr: "أمن البيانات",
    titleEn: "Data Security"
  }
};

function App() {
  const [activeSubject, setActiveSubject] = useState('networks');
  const [activeSection, setActiveSection] = useState('overview');

  const currentSubject = SUBJECTS.find(s => s.id === activeSubject);
  const bundle = SUBJECT_DATA[activeSubject];

  function renderSection() {
    if (!bundle) return <ComingSoon subject={currentSubject} />;
    switch (activeSection) {
      case 'overview': return <OverviewSection data={bundle.overview} showLayers={bundle.showLayers} />;
      case 'concepts': return <ConceptsSection data={bundle.concepts} />;
      case 'quicksum': return <QuickSummarySection data={bundle.quicksum} />;
      case 'deepsum': return <DeepSummarySection data={bundle.concepts} />;
      case 'mcq': return <MCQSection data={bundle.mcq} />;
      case 'review': return <ReviewSection data={bundle.review} />;
      default: return null;
    }
  }

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <div className="brand-mark"></div>
          <div className="brand-text">
            <div className="ar">منصة دراسة الماجستير</div>
            <div className="sub en">MASTER'S STUDY PLATFORM</div>
          </div>
        </div>
      </div>

      <div className="subject-tabs">
        {SUBJECTS.map(s => (
          <div key={s.id}
               className={`subject-tab ${activeSubject===s.id ? 'active':''}`}
               onClick={() => { setActiveSubject(s.id); setActiveSection('overview'); }}>
            <span className="num mono">{s.num}</span>
            <span>{s.ar}</span>
          </div>
        ))}
      </div>

      {bundle && (
        <div className="subnav">
          {SECTION_TYPES.map(sec => (
            <div key={sec.id}
                 className={`subnav-btn ${activeSection===sec.id ? 'active':''}`}
                 onClick={() => setActiveSection(sec.id)}
                 style={{cursor:'pointer'}}>
              {sec.ar}
            </div>
          ))}
        </div>
      )}

      <div className="content">
        {bundle && (
          <div className="subject-hero">
            <div className="eyebrow">{bundle.eyebrow}</div>
            <h1>{bundle.titleAr}</h1>
            <div className="source">{bundle.titleEn}</div>
          </div>
        )}
        {renderSection()}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
